plugins {
    id 'java'
    id 'application'
}

group = 'com.example1'
version = '1.0-SNAPSHOT'

description = "MyMavenToGradle"

java {
    sourceCompatibility = JavaVersion.VERSION_17   // change to 11 if needed
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}

application {
    mainClass = 'com.example.App'   // ⚠️ CHANGE THIS to your actual main class
}
